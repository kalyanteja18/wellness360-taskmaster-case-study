spring.application.name=taskmaster

# JPA / DB — values injected as env vars by ECS at runtime (see terraform/ecs.tf)
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:taskmaster}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Actuator — health check (used by ALB target group) + Prometheus scrape endpoint
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
